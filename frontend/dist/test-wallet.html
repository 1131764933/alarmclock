<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlarmClock - Direct Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; color: #6366f1; }
    button { width: 100%; padding: 15px; font-size: 18px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 8px; margin-bottom: 10px; }
    button:hover { background: #4f46e5; }
    #result { padding: 15px; background: #1a1a2e; border-radius: 8px; margin-top: 20px; }
    .error { color: #ef4444; }
    .success { color: #10b981; }
    .info { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⏰ AlarmClock - Wallet Test</h1>
    
    <button id="connectBtn">🦊 Connect MetaMask</button>
    <button id="checkBtn">🔍 Check MetaMask Status</button>
    
    <div id="result"></div>
  </div>

  <script>
    const connectBtn = document.getElementById('connectBtn')
    const checkBtn = document.getElementById('checkBtn')
    const result = document.getElementById('result')
    
    function log(msg, type = 'info') {
      result.innerHTML = `<p class="${type}">${msg}</p>`
      console.log(msg)
    }
    
    checkBtn.addEventListener('click', () => {
      log('Checking window.ethereum...', 'info')
      log('window.ethereum exists: ' + (window.ethereum !== undefined), 'info')
      log('window.ethereum is: ' + typeof window.ethereum, 'info')
    })
    
    connectBtn.addEventListener('click', async () => {
      log('Clicked connect button!', 'info')
      
      if (!window.ethereum) {
        log('❌ MetaMask not found! Please install MetaMask extension.', 'error')
        return
      }
      
      log('✅ MetaMask found!', 'success')
      
      try {
        log('Requesting accounts...', 'info')
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' })
        log('✅ Connected! Account: ' + accounts[0], 'success')
      } catch (err) {
        log('❌ Error: ' + err.message, 'error')
      }
    })
  </script>
</body>
</html>
