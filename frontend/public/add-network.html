<!DOCTYPE html>
<html>
<head>
  <title>Add Network to MetaMask</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    button { 
      display: block; 
      width: 100%; 
      padding: 15px 20px; 
      margin: 10px 0;
      font-size: 16px;
      cursor: pointer;
      border: 2px solid #627eea;
      background: #627eea;
      color: white;
      border-radius: 8px;
    }
    button:hover { background: #4a6bc7; }
    .note { color: #666; font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>连接 AlarmClock</h1>
  
  <button id="switchSepolia">切换到 Sepolia 测试网</button>
  
  <div class="note">
    <p><strong>Sepolia 测试网信息：</strong></p>
    <ul>
      <li>RPC: https://sepolia.infura.io/v3/eeed896aed05408ab241e9e9f2dd0ab1</li>
      <li>Chain ID: 11155111 (0xaa36a7)</li>
      <li>符号: ETH</li>
      <li>区块浏览器: https://sepolia.etherscan.io</li>
    </ul>
    <p><strong>注意：</strong> 如果之前添加过 Sepolia 网络但符号不匹配，请先在 MetaMask 中删除该网络，然后重新添加。</p>
  </div>
  
  <script>
    const SEPOLIA_CHAIN_ID = '0xaa36a7'; // 11155111

    document.getElementById('switchSepolia').addEventListener('click', async () => {
      if (typeof window.ethereum === 'undefined') {
        alert('请先安装 MetaMask!');
        return;
      }
      try {
        // 尝试直接切换
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: SEPOLIA_CHAIN_ID }]
        });
      } catch (switchError) {
        // 如果网络不存在，添加它
        if (switchError.code === 4902) {
          try {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId: SEPOLIA_CHAIN_ID,
                chainName: 'Sepolia Testnet',
                nativeCurrency: {
                  name: 'Ethereum',
                  symbol: 'ETH',
                  decimals: 18
                },
                rpcUrls: ['https://sepolia.infura.io/v3/eeed896aed05408ab241e9e9f2dd0ab1'],
                blockExplorerUrls: ['https://sepolia.etherscan.io']
              }]
            });
          } catch (addError) {
            alert('添加网络失败: ' + addError.message);
          }
        } else {
          alert('切换网络失败: ' + switchError.message);
        }
      }
    });
  </script>
</body>
</html>
